apiVersion: apps/v1
kind: Deployment
metadata:
  name: resolver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resolver
  template:
    metadata:
      labels:
        app: resolver
    spec:
      containers:
        - name: resolver
          image: resolver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/resolver
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: admin
            - name: EUREKA_CLIENT_ENABLED
              value: "false"