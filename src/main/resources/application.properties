# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# APPLICATION
# ===============================
spring.application.name=resolver

# ===============================
# DATABASE (MySQL - for Docker)
# ===============================
spring.datasource.url=jdbc:mysql://mysql:3306/resolver
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# JWT
# ===============================
jwt.secret=mysecretkeymysecretkeymysecretkey

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.resolver=DEBUG

# ===============================
# ACTUATOR + PROMETHEUS
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true

info.app.name=Resolver ms
info.app.description=Microservice
info.app.version=1.0

# ===============================
# DISABLE EXTERNAL DEPENDENCIES
# ===============================

# ❌ Disable Eureka
eureka.client.enabled=false

# ❌ Disable Zipkin (optional for now)
management.tracing.enabled=false

# ❌ Disable Kafka auto fail (optional safety)
##spring.kafka.bootstrap-servers=localhost:9092

# ❌ Disable RabbitMQ auto fail (optional safety)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest