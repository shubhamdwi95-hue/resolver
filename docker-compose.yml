version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: resolver
    ports:
      - "3307:3306"
    restart: always

  resolver:
    build: .
    container_name: resolver
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: always